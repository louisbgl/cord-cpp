name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-multi-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  test-single-header:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate single header
        run: python3 scripts/gen_single_header.py

      - name: Configure
        run: cmake -S . -B build -DCORD_SINGLE_HEADER=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure
